<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Token Saver 節約デモ</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #2563eb; font-size: 24px; }
        textarea { width: 100%; height: 150px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
        button { background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        button:hover { background: #059669; transform: translateY(-2px); }
        .stats { display: flex; justify-content: space-around; background: #1e293b; color: white; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .stat-box { text-align: center; }
        .stat-val { font-size: 24px; font-weight: bold; display: block; }
        .stat-label { font-size: 12px; color: #94a3b8; }
        .diff { color: #4ade80; font-weight: bold; }
        .log { margin-top: 20px; font-size: 14px; color: #64748b; border-left: 4px solid #10b981; padding-left: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h1>✨ AI Token Saver デモ</h1>
    <p>文章を入力して「節約実行」を押すと、どれだけトークンが減るか分かります。</p>
    
    <textarea id="input" placeholder="ここへテスト文章を入力...（例：お疲れ様です。　２０２４年度の件ですが...）">お疲れ様です。
お世話になっております。

本日作成した　２０２４年度の　Ａプロジェクトの　議事録　についてですが、
内容に間違いがないか　ご確認をお願いいたします。

よろしくお願いします。</textarea>

    <div class="controls">
        <button onclick="runDemo()">⚡ 節約実行（AI圧縮）</button>
    </div>

    <div class="stats">
        <div class="stat-box">
            <span class="stat-label">元トークン数</span>
            <span id="before-count" class="stat-val">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">節約後</span>
            <span id="after-count" class="stat-val">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">削減率</span>
            <span id="reduction" class="stat-val diff">0%</span>
        </div>
    </div>

    <div id="log" class="log">
        <strong>実施された処理:</strong><br>
        <span id="log-content">待機中...</span>
    </div>
</div>

<script>
function estimateToken(text) {
    if (!text) return 0;
    const latin = text.match(/[\x00-\x7F]/g) || [];
    const nonLatin = text.match(/[^\x00-\x7F]/g) || [];
    return Math.ceil(latin.length / 3.8 + nonLatin.length * 1.3);
}

function runDemo() {
    const inputArea = document.getElementById('input');
    const original = inputArea.value;
    const beforeCount = estimateToken(original);

    // 節約ロジック
    let res = original.normalize('NFKC'); // 全角半角化
    res = res.replace(/(お疲れ様です|お世話になっております|よろしくお願いします|お願いいたします)[。、！]*/g, '');
    res = res.replace(/を確認してください/g, 'を確認せよ').replace(/についてですが/g, 'に関し');
    res = res.replace(/[ 　]+/g, ' ').replace(/\n\s*\n/g, '\n');
    const processed = res.trim();

    const afterCount = estimateToken(processed);
    const reduction = beforeCount > 0 ? Math.round((1 - afterCount / beforeCount) * 100) : 0;

    // UI反映
    inputArea.value = processed;
    document.getElementById('before-count').innerText = beforeCount;
    document.getElementById('after-count').innerText = afterCount;
    document.getElementById('reduction').innerText = reduction + '%';
    
    document.getElementById('log-content').innerHTML = `
        ・全角英数字を半角に変換しました (2024, A...) <br>
        ・不要な挨拶を削除しました <br>
        ・連続するスペースと空行を詰めました <br>
        ・語尾をAI向けに短縮しました
    `;
}

// 初期カウント表示
document.getElementById('before-count').innerText = estimateToken(document.getElementById('input').value);
</script>

</body>
</html>
